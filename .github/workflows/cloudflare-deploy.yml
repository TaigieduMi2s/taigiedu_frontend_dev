name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    # 根據分支自動選擇對應的 GitHub Environment（含變數設定）
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file from GitHub Environment Variables
        run: |
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" >> .env
          echo "VITE_IMAGE_URL=${{ vars.VITE_IMAGE_URL }}" >> .env
          echo "VITE_BASE_PATH=${{ vars.VITE_BASE_PATH }}" >> .env
          echo "VITE_ENABLE_UNSTABLE_FEATURES=${{ vars.VITE_ENABLE_UNSTABLE_FEATURES }}" >> .env
          echo "VITE_ENABLE_TOPIC_INTEGRATION_FEATURE=${{ vars.VITE_ENABLE_TOPIC_INTEGRATION_FEATURE }}" >> .env
          echo "VITE_ENABLE_ROBOTS_NOINDEX=${{ vars.VITE_ENABLE_ROBOTS_NOINDEX }}" >> .env
          echo "VITE_ENABLE_SERVICE_SUSPENSION_NOTICE=${{ vars.VITE_ENABLE_SERVICE_SUSPENSION_NOTICE }}" >> .env

      - name: Configure wrangler.jsonc for branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            WORKER_NAME="taiwanese-omg"
            ROUTE_PATTERN="www.taigiedu.com/*"
          else
            WORKER_NAME="taiwanese-omg-dev"
            ROUTE_PATTERN="dev.taigiedu.com/*"
          fi
          sed -i "s|__WORKER_NAME__|${WORKER_NAME}|g" wrangler.jsonc
          sed -i "s|__ROUTE_PATTERN__|${ROUTE_PATTERN}|g" wrangler.jsonc
          echo "=== Resolved wrangler.jsonc ==="
          cat wrangler.jsonc

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
